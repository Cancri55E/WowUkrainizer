name: Bug Report
description: Report a technical bug in WowUkrainizer
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for taking the time to fill out this bug report!
        >
        > Please search **[existing issues](https://github.com/Cancri55E/WowUkrainizer/issues)** to see if this bug has already been reported.
        >
        > This tracker is for **technical bugs only** (e.g., wrong tooltip shown, UI error, Lua error, broken frame).
        > For **translation quality** issues (typos, wrong wording, missing translation), please use our [Discord](https://discord.gg/TU9E4HwKGg).

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the addon is affected?
      options:
        - Quests (quest log, quest frames, objectives)
        - Tooltips (spells, items, macros, money)
        - NPC (dialogues, gossip, subtitles, unit names)
        - UI Frames (talents, character, map, minimap, nameplates, splash screen)
        - Zone Texts
        - Settings / Addon UI (settings panel, wizard, changelog)
        - Third-party Addon Compatibility (Immersion, DejaCharacterStats)
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps needed to reproduce the issue.
      placeholder: |
        1. Open `...`
        2. Hover over `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error log / Lua error
      description: Paste any relevant Lua error or stack trace. You can use addons like BugSack or BugGrabber to capture errors.
      render: text

  - type: input
    id: addon-version
    attributes:
      label: Addon version
      description: Found in the addon settings or on the CurseForge/Wago page.
      placeholder: e.g., 3.2.1
    validations:
      required: true

  - type: textarea
    id: other-addons
    attributes:
      label: Other addons that may be relevant
      description: List any addons that might conflict or interact with the affected area (e.g., ElvUI, WeakAuras, Immersion).
      placeholder: |
        - ElvUI
        - WeakAuras

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Additional context or related issues.
