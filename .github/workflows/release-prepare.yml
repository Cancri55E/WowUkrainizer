name: Release - Prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.16.0)"
        required: true
        type: string

jobs:
  prepare:
    name: Prepare release branch
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in format X.Y.Z (e.g. 1.16.0)"
            exit 1
          fi

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure release branch does not already exist
        run: |
          BRANCH="release/v${{ inputs.version }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists on origin. Delete it or pick another version."
            exit 1
          fi

      - name: Validate [Next] sections exist
        run: |
          if ! grep -q '^\* \*\*\[Next\]:\*\*' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no [Next] section. Add changes on develop before releasing."
            exit 1
          fi
          if ! grep -q 'version = "Next"' Database/Init.lua; then
            echo "::error::Database/Init.lua has no changelog entry with version = \"Next\"."
            exit 1
          fi

      - name: Create release branch
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^\* \*\*\[Next\]:\*\*/* **v${VERSION} (${DATE}):**/" CHANGELOG.md
          echo "Updated CHANGELOG.md:"
          head -10 CHANGELOG.md

      - name: Update Lua changelog entries
        run: |
          VERSION="${{ inputs.version }}"
          MONTHS_UA=("" "січня" "лютого" "березня" "квітня" "травня" "червня" "липня" "серпня" "вересня" "жовтня" "листопада" "грудня")
          MONTH_NUM=$(date +%-m)
          DAY=$(date +%-d)
          YEAR=$(date +%Y)
          DATE_UA="${DAY} ${MONTHS_UA[$MONTH_NUM]} ${YEAR}"

          sed -i 's/version = "Next"/version = "'"${VERSION}"'"/' Database/Init.lua
          sed -i '0,/date = ""/s//date = "'"${DATE_UA}"'"/' Database/Init.lua

          ENTRY_COUNT=$(grep -c "version = \"${VERSION}\"" Database/Init.lua)
          echo "Set version to ${VERSION} in ${ENTRY_COUNT} changelog entries"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Checkout DevTools
        uses: actions/checkout@v4
        with:
          ref: main
          repository: Cancri55E/WowUkrainizer-DevTools
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: DevTools

      - name: Checkout RawData
        uses: actions/checkout@v4
        with:
          ref: main
          repository: Cancri55E/WowUkrainizer-Data
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: RawData
          fetch-depth: 0

      - name: Compute and pin release metadata
        id: meta
        run: |
          RAW_DATA_SHA=$(git -C RawData rev-parse HEAD)
          TRANSLATION_BUILD=$(git -C RawData rev-list --count HEAD)
          FULL_VERSION="v${{ inputs.version }}.${TRANSLATION_BUILD}"
          PREPARED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "raw_data_sha=$RAW_DATA_SHA" >> "$GITHUB_OUTPUT"
          echo "translation_build=$TRANSLATION_BUILD" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "prepared_at=$PREPARED_AT" >> "$GITHUB_OUTPUT"
          echo "====================================="
          echo "RawData SHA:         $RAW_DATA_SHA"
          echo "Translation build:   $TRANSLATION_BUILD"
          echo "Full version:        $FULL_VERSION"
          echo "====================================="

      - name: Restore and build DevTools
        run: |
          dotnet restore DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj
          dotnet build DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj --configuration Release --no-restore

      - name: Generate Database files
        run: |
          dotnet run --project DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj \
            --configuration Release \
            --mode "generate-lua" \
            --connectionString "${{ secrets.MAIN_DB_CONNECTION_STRING }}" \
            --folder "${{ github.workspace }}/Database" \
            --gameClientConnectionString "${{ secrets.MONGODB_CONNECTION_STRING }}" 2>log.txt
          cat log.txt

      - name: Write .release-meta.json
        run: |
          jq -n \
            --arg version "${{ inputs.version }}" \
            --arg full_version "${{ steps.meta.outputs.full_version }}" \
            --arg raw_data_sha "${{ steps.meta.outputs.raw_data_sha }}" \
            --argjson translation_build ${{ steps.meta.outputs.translation_build }} \
            --arg prepared_at "${{ steps.meta.outputs.prepared_at }}" \
            '{version: $version, full_version: $full_version, raw_data_sha: $raw_data_sha, translation_build: $translation_build, prepared_at: $prepared_at}' \
            > .release-meta.json
          cat .release-meta.json

      - name: Commit and push release branch
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git add CHANGELOG.md Database/ .release-meta.json
          git commit -m "chore: prepare release v${{ inputs.version }}"
          git push -u origin "$BRANCH"

      - name: Build artifact package (no CurseForge upload)
        run: |
          BRANCH="release/v${{ inputs.version }}"
          curl -fL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/package.yml/dispatches \
            -d '{"ref":"'"$BRANCH"'","inputs":{"create_github_release":"false","publish_to_curseforge":"false","regenerate_database":"true"}}'

      - name: Open draft PR to master
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          BRANCH="release/v${{ inputs.version }}"
          VERSION="${{ inputs.version }}"
          gh pr create \
            --draft \
            --base master \
            --head "$BRANCH" \
            --title "release: v${VERSION}" \
            --body "$(cat <<EOF
          ## Overview

          Release candidate for **v${VERSION}**.

          Merging this PR will trigger the publish workflow:
          - Tag the merge commit on \`master\` as \`v${VERSION}.<translation_build>\`.
          - Create the GitHub Release.
          - Upload to CurseForge.
          - Merge \`master\` back into \`develop\`.

          ## Pre-merge checklist

          - [ ] Smoke-tested the artifact zip from the triggered \`Build and Deploy Package\` run (Actions tab).
          - [ ] CHANGELOG entry for v${VERSION} reviewed.
          - [ ] Any hotfixes pushed directly to \`$BRANCH\`.
          - [ ] Re-ran \`Build and Deploy Package\` against \`$BRANCH\` after fixes if needed.

          ## Re-running the artifact build

          Manually dispatch \`Build and Deploy Package\` against \`$BRANCH\` with:
          - \`publish_to_curseforge\` = \`false\`
          - \`create_github_release\` = \`false\`
          - \`regenerate_database\` = \`true\` (default — pinned to RawData SHA from \`.release-meta.json\`)
          EOF
          )"
