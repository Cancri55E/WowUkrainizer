name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.16.0)"
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in format X.Y.Z (e.g. 1.16.0)"
            exit 1
          fi

      # ── Checkout & merge develop → master ─────────────────

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into master
        run: |
          git fetch origin develop
          git merge --no-ff origin/develop -m "Merge develop into master for release v${{ inputs.version }}"

      # ── Validate changelogs ───────────────────────────────

      - name: Validate NEXT sections exist
        run: |
          if ! grep -q '^\## \[NEXT\]' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no [NEXT] section. Add changes on develop before releasing."
            exit 1
          fi
          if ! grep -q 'version = "NEXT"' Database/Init.lua; then
            echo "::error::Database/Init.lua has no changelog entry with version = \"NEXT\"."
            exit 1
          fi

      # ── Update changelogs ─────────────────────────────────

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^## \[NEXT\]/## [v${VERSION}] - ${DATE}/" CHANGELOG.md
          echo "Updated CHANGELOG.md:"
          head -10 CHANGELOG.md

      - name: Update Lua changelog entries
        run: |
          VERSION="${{ inputs.version }}"
          MONTHS_UA=("" "січня" "лютого" "березня" "квітня" "травня" "червня" "липня" "серпня" "вересня" "жовтня" "листопада" "грудня")
          MONTH_NUM=$(date +%-m)
          DAY=$(date +%-d)
          YEAR=$(date +%Y)
          DATE_UA="${DAY} ${MONTHS_UA[$MONTH_NUM]} ${YEAR}"

          sed -i 's/version = "NEXT"/version = "'"${VERSION}"'"/' Database/Init.lua
          sed -i 's/date = ""/date = "'"${DATE_UA}"'"/' Database/Init.lua

          ENTRY_COUNT=$(grep -c "version = \"${VERSION}\"" Database/Init.lua)
          echo "Set version to ${VERSION} in ${ENTRY_COUNT} changelog entries"

      # ── Sync Database ─────────────────────────────────────

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Checkout DevTools
        uses: actions/checkout@v4
        with:
          ref: main
          repository: Cancri55E/WowUkrainizer-DevTools
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: DevTools

      - name: Checkout RawData
        uses: actions/checkout@v4
        with:
          ref: main
          repository: Cancri55E/WowUkrainizer-Data
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: RawData
          fetch-depth: 0

      - name: Restore and build DevTools
        run: |
          dotnet restore DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj
          dotnet build DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj --configuration Release --no-restore

      - name: Generate Database files
        run: |
          dotnet run --project DevTools/WowUkrainizer.DevTools/WowUkrainizer.DevTools.csproj \
            --configuration Release \
            --mode "generate-lua" \
            --connectionString "${{ secrets.MAIN_DB_CONNECTION_STRING }}" \
            --folder "${{ github.workspace }}/Database" \
            --gameClientConnectionString "${{ secrets.MONGODB_CONNECTION_STRING }}" 2>log.txt
          cat log.txt

      # ── Compute version, commit, tag ──────────────────────

      - name: Compute full version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          TRANSLATION_BUILD=$(git -C RawData rev-list --count HEAD)
          FULL_VERSION="v${VERSION}.${TRANSLATION_BUILD}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "====================================="
          echo "Base version:        $VERSION"
          echo "Translation build:   $TRANSLATION_BUILD"
          echo "Full version:        $FULL_VERSION"
          echo "====================================="

      - name: Commit release to master
        run: |
          git add -A
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git push origin master

      - name: Create version tag
        run: |
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          git tag -a "$FULL_VERSION" -m "Release $FULL_VERSION"
          git push origin "$FULL_VERSION"
          echo "Created tag: $FULL_VERSION"

      # ── GitHub release ────────────────────────────────────

      - name: Extract release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk '/^## \[v'"${VERSION}"'\]/{found=1; next} found && /^## \[/{exit} found' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.full_version }}
          name: "v${{ steps.version.outputs.version }}"
          body_path: RELEASE_NOTES.md
          prerelease: false

      # ── Trigger package FROM THE TAG ──────────────────────

      - name: Trigger package workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/package.yml/dispatches \
            -d '{"ref":"${{ steps.version.outputs.full_version }}","inputs":{"create_github_release":"true"}}'

      # ── Merge release changes back to develop ─────────────

      - name: Merge master back into develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge origin/master --no-edit -m "Merge release v${{ steps.version.outputs.version }} back into develop" || {
            echo "::warning::Auto-merge to develop failed due to conflicts."
            echo "::warning::Please merge master into develop manually: git merge origin/master"
            git merge --abort
            exit 0
          }
          git push origin develop
          echo "Successfully merged release changes back to develop"
