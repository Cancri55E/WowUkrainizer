name: Release - Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  publish:
    name: Tag, release, publish
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - name: Extract version from branch name
        id: meta
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          VERSION="${HEAD_REF#release/v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Branch $HEAD_REF does not encode a valid X.Y.Z version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sanity-check changelogs are finalized
        run: |
          if grep -q '^\* \*\*\[Next\]:\*\*' CHANGELOG.md; then
            echo "::error::CHANGELOG.md still contains a [Next] section after merge."
            exit 1
          fi
          if grep -q 'version = "Next"' Database/Init.lua; then
            echo "::error::Database/Init.lua still contains version = \"Next\" after merge."
            exit 1
          fi

      - name: Read pinned release metadata
        id: version
        run: |
          if [ ! -f .release-meta.json ]; then
            echo "::error::.release-meta.json missing on master. Was the release branch prepared by release-prepare.yml?"
            exit 1
          fi
          META_VERSION=$(jq -r '.version' .release-meta.json)
          FULL_VERSION=$(jq -r '.full_version' .release-meta.json)
          RAW_DATA_SHA=$(jq -r '.raw_data_sha' .release-meta.json)
          if [ "$META_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::Version mismatch — branch encodes ${{ steps.meta.outputs.version }} but .release-meta.json says $META_VERSION"
            exit 1
          fi
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "raw_data_sha=$RAW_DATA_SHA" >> "$GITHUB_OUTPUT"
          echo "====================================="
          echo "Full version:   $FULL_VERSION"
          echo "RawData SHA:    $RAW_DATA_SHA"
          echo "====================================="

      - name: Create or reuse tag
        run: |
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          if git rev-parse -q --verify "refs/tags/$FULL_VERSION" >/dev/null; then
            echo "Tag $FULL_VERSION already exists locally; skipping."
          elif git ls-remote --exit-code --tags origin "$FULL_VERSION" >/dev/null 2>&1; then
            echo "Tag $FULL_VERSION already exists on origin; skipping."
          else
            git tag -a "$FULL_VERSION" -m "Release $FULL_VERSION"
            git push origin "$FULL_VERSION"
            echo "Created tag: $FULL_VERSION"
          fi

      - name: Extract release notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          awk '/^\* \*\*v'"${VERSION}"' \(/{found=1; print; next} found && /^\* \*\*v/{exit} found' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.full_version }}
          name: "v${{ steps.meta.outputs.version }}"
          body_path: RELEASE_NOTES.md
          prerelease: false

      - name: Trigger package workflow (CurseForge + GitHub asset)
        run: |
          curl -fL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/package.yml/dispatches \
            -d '{"ref":"${{ steps.version.outputs.full_version }}","inputs":{"create_github_release":"true","publish_to_curseforge":"true","regenerate_database":"false"}}'

      - name: Merge master back into develop
        run: |
          git fetch origin develop
          git checkout develop
          if git merge origin/master --no-edit -m "Merge release v${{ steps.meta.outputs.version }} back into develop"; then
            git push origin develop
            echo "Merged release into develop"
          else
            echo "::warning::Auto-merge to develop failed. Resolve manually: git checkout develop && git merge origin/master"
            git merge --abort || true
          fi

      - name: Delete release branch
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          BRANCH="${{ steps.meta.outputs.head_ref }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH" || echo "::warning::Failed to delete $BRANCH"
          else
            echo "Branch $BRANCH already gone."
          fi
